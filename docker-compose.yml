version: '3.8'

services:
  reno_note_mariadb:
    image: mariadb:latest
    container_name: reno_note_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: document
      MYSQL_USER: doc
      MYSQL_PASSWORD: 123456 
    networks:
      - reno_note_app_network
    volumes:
      - reno_note_mariadb_data:/var/lib/mysql
      - ./mariadb-conf:/etc/mysql/conf.d/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  reno_note_nodejs:
    image: node:alpine
    container_name: reno_note_nodejs
    working_dir: /app/server
    volumes:
      - ./server:/app/server
    command: node build/index.js
    environment:
      - NODE_ENV=production
    networks:
      - reno_note_app_network
    depends_on:
      reno_note_mariadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/doc/server/hello"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s 

  reno_note_nginx:
    image: nginx:latest
    container_name: reno_note_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./client/dist:/app/client
      - ~/certificate:/app/certificate
    ports:
      # If you don't want to expose the None SSL port 80, comment out the following line.
      - "80:80"
      - "443:443"
    networks:
      - reno_note_app_network
    depends_on:
      - reno_note_nodejs
    restart: unless-stopped
  
networks:
  reno_note_app_network:
    driver: bridge

volumes:
  reno_note_mariadb_data:
